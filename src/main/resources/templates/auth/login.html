<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Login - DigiBank')}"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1><i class="fas fa-building-columns"></i> DigiBank</h1>
        <p class="subtitle">Secure Digital Banking</p>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-circle-exclamation"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-circle-check"></i> You have been successfully logged out.
        </div>
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-circle-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-lock"></i> Sign In
            </button>
        </form>
        <div class="auth-link">
            Don't have an account? <a th:href="@{/auth/register}">Create one</a>
        </div>
    </div>
</div>
</body>
</html>
