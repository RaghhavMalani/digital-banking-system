<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Register - DigiBank')}"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1><i class="fas fa-user-plus"></i> Register</h1>
        <p class="subtitle">Create your digital banking account</p>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required/>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required minlength="6"/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" th:field="*{phone}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}" class="form-control" required/>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Full Address (KYC)</label>
                <textarea id="address" th:field="*{address}" class="form-control" rows="2" required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="aadhaarNumber">Aadhaar Number (KYC)</label>
                    <input type="text" id="aadhaarNumber" th:field="*{aadhaarNumber}" class="form-control" required maxlength="12" pattern="\d{12}" placeholder="12-digit Aadhaar"/>
                </div>
                <div class="form-group">
                    <label for="panNumber">PAN Number (KYC)</label>
                    <input type="text" id="panNumber" th:field="*{panNumber}" class="form-control" required maxlength="10" style="text-transform: uppercase;" placeholder="10-character PAN"/>
                </div>
            </div>
            <hr style="margin: 1.5rem 0; border: 1px solid var(--border-color);"/>
            <div class="form-group">
                <label for="initialDeposit">Initial Deposit (Minimum ₹1,00,000)</label>
                <input type="number" id="initialDeposit" name="initialDeposit" class="form-control" required min="100000" value="100000" step="1000"/>
                <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;"><i class="fas fa-info-circle"></i> Complete your registration by paying a minimum deposit of ₹1,00,000. Balance can be used freely.</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-check"></i> Register Account
            </button>
        </form>
        <div class="auth-link">
            Already have an account? <a th:href="@{/auth/login}">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
