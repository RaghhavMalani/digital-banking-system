<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Statements - DigiBank')}"></head>
<body>
<div class="layout">
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-list-ul"></i> Account Statements</h1>
        </div>

        <div th:replace="~{fragments/header :: alerts}"></div>

        <div class="card">
            <div class="card-header"><i class="fas fa-filter"></i> Generate Statement</div>
            <form th:action="@{/statements/generate}" method="get">
                <div class="form-row">
                    <div class="form-group">
                        <label for="accountId">Account</label>
                        <select id="accountId" name="accountId" class="form-control" required>
                            <option value="">Select account</option>
                            <option th:each="acc : ${accounts}"
                                    th:value="${acc.id}"
                                    th:selected="${selectedAccount != null and selectedAccount.id == acc.id}"
                                    th:text="${acc.accountType + ' - ' + acc.accountNumber}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group flex gap-1">
                        <div style="flex:1;">
                            <label for="fromDate">From Date</label>
                            <input type="date" id="fromDate" name="fromDate" class="form-control" th:value="${fromDate}" required/>
                        </div>
                        <div style="flex:1;">
                            <label for="toDate">To Date</label>
                            <input type="date" id="toDate" name="toDate" class="form-control" th:value="${toDate}" required/>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Generate</button>
            </form>
        </div>

        <div th:if="${transactions != null}" class="card">
            <div class="card-header justify-between">
                <span><i class="fas fa-file-invoice"></i> Results</span>
                <span style="font-size: 0.8rem; font-weight:normal; color: var(--text-muted);"
                      th:text="${#lists.size(transactions)} + ' records'">0 records</span>
            </div>

            <div th:if="${#lists.isEmpty(transactions)}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No transactions found for this period.</p>
            </div>

            <table th:if="${!#lists.isEmpty(transactions)}">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Reference</th>
                        <th>Description</th>
                        <th class="text-right">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="txn : ${transactions}">
                        <td th:text="${txn.timestamp != null} ? ${#temporals.format(txn.timestamp, 'dd MMM yyyy')} : '-'">01 Jan</td>
                        <td><span class="badge" th:text="${txn.type}">TRF</span></td>
                        <td><code th:text="${txn.referenceId}">TXN0</code></td>
                        <td th:text="${txn.description ?: '-'}">-</td>
                        <td class="text-right font-medium">
                            <span th:if="${txn.sourceAccount != null and txn.sourceAccount.id == selectedAccount.id}"
                                  style="color: var(--black);" th:text="'-₹' + ${#numbers.formatDecimal(txn.amount, 1, 2)}">-₹0</span>
                            <span th:if="${txn.destinationAccount != null and txn.destinationAccount.id == selectedAccount.id}"
                                  style="color: var(--black);" th:text="'+₹' + ${#numbers.formatDecimal(txn.amount, 1, 2)}">+₹0</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
