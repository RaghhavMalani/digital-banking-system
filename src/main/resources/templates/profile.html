<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Profile - DigiBank')}"></head>
<body>
<div class="layout">
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-user-circle"></i> Profile &amp; KYC</h1>
        </div>

        <div th:replace="~{fragments/header :: alerts}"></div>

        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-header"><i class="fas fa-address-card"></i> Account Information</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Username</div>
                    <div class="info-value" th:text="${user.username}">johndoe</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Member Since</div>
                    <div class="info-value" th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'dd MMM yyyy, hh:mm a')} : 'N/A'">01 Jan 2026</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Role</div>
                    <div class="info-value">
                        <span class="badge" th:text="${user.role}">CUSTOMER</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">KYC Status</div>
                    <div class="info-value">
                        <span class="badge"
                              th:text="${user.panNumber != null and user.aadhaarNumber != null and !user.panNumber.isEmpty() and !user.aadhaarNumber.isEmpty()} ? 'Verified' : 'Incomplete'">Incomplete</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-pen-to-square"></i> Update Profile</div>
            <form th:action="@{/profile}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" class="form-control"
                               th:value="${user.fullName}" required/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control"
                               th:value="${user.email}" required/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control"
                               th:value="${user.phone}"/>
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth</label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" class="form-control"
                               th:value="${user.dateOfBirth}"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" class="form-control"
                           th:value="${user.address}"/>
                </div>

                <div style="font-weight: 600; margin-top: 1.5rem; margin-bottom: 1rem;"><i class="fas fa-file-shield"></i> KYC Documents</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="panNumber">PAN Number</label>
                        <input type="text" id="panNumber" name="panNumber" class="form-control"
                               th:value="${user.panNumber}" maxlength="10" style="text-transform: uppercase;"/>
                    </div>
                    <div class="form-group">
                        <label for="aadhaarNumber">Aadhaar Number</label>
                        <input type="text" id="aadhaarNumber" name="aadhaarNumber" class="form-control"
                               th:value="${user.aadhaarNumber}" maxlength="12"/>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;"><i class="fas fa-save"></i> Save Changes</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
