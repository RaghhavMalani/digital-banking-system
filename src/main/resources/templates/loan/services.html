<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Service Requests - DigiBank')}"></head>
<body>
<div class="layout">
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-headset"></i> Service Requests</h1>
        </div>

        <div th:replace="~{fragments/header :: alerts}"></div>

        <div class="card">
            <div class="card-header"><i class="fas fa-plus"></i> New Request</div>
            <form th:action="@{/loans/services/request}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="accountId">Account</label>
                        <select id="accountId" name="accountId" class="form-control" required>
                            <option value="">Select account</option>
                            <option th:each="acc : ${accounts}"
                                    th:value="${acc.id}"
                                    th:text="${acc.accountType + ' - ' + acc.accountNumber}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="requestType">Service Type</label>
                        <select id="requestType" name="requestType" class="form-control" required>
                            <option value="">Select service type</option>
                            <option th:each="type : ${serviceTypes}"
                                    th:value="${type.name()}"
                                    th:text="${type.name().replace('_', ' ')}">
                            </option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="remarks">Remarks (optional)</label>
                    <input type="text" id="remarks" name="remarks" class="form-control"/>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit Request</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-clock-rotate-left"></i> History</div>

            <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <p>No service requests found.</p>
            </div>

            <table th:if="${!#lists.isEmpty(requests)}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Account</th>
                        <th>Status</th>
                        <th>Remarks</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="req : ${requests}">
                        <td th:text="'#' + ${req.id}">#1</td>
                        <td th:text="${req.requestType.name().replace('_', ' ')}">TYPE</td>
                        <td><code th:text="${req.account.accountNumber}">000</code></td>
                        <td><span class="badge" th:text="${req.status}">PENDING</span></td>
                        <td th:text="${req.remarks ?: '-'}">-</td>
                        <td th:text="${req.createdAt != null} ? ${#temporals.format(req.createdAt, 'dd MMM yyyy')} : '-'">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
